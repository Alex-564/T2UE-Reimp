seed: 123

device: "cuda"
num_workers: 4
prefetch_factor: 1

# COCO paths are provided via CLI (--coco-root, --coco-ann)

# CLIP surrogate
clip:
  model_name: "ViT-B/32"   # OpenAI CLIP string

# Generator
gen:
  z_dim: 128
  text_dim: 512           # OpenAI CLIP text embed dim for ViT-B/32
  base_ch: 512            # start at 4x4x512 as in Fig.3
  out_res: 224            # CLIP expects 224x224 inputs
  eps: 0.031372549        # 8/255

train:
  batch_size: 128
  epochs: 200 # reduced from 500 
  lr: 1.0e-4
  weight_decay: 1.0e-4
  # Enable CUDA mixed precision with bfloat16 by default.
  amp:
    enabled: true
    dtype: "bf16"
  log_every: 50
  save_every_epochs: 20
  out_dir: "./runs/vitb32_epoch200_cocoFull"
