seed: 123

device: "cuda"
num_workers: 8

clip:
  model_name: "ViT-B/16"

gen:
  z_dim: 128
  text_dim: 512
  base_ch: 512
  out_res: 224
  eps: 0.031372549

train:
  batch_size: 128
  epochs: 300
  lr: 1.0e-4
  weight_decay: 1.0e-4
  # Enable CUDA mixed precision with bfloat16 by default.
  amp:
    enabled: true
    dtype: "bf16"
  log_every: 50
  save_every_epochs: 10
  out_dir: "./runs/vitb16"
